name: Sanitizers

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [asan, ubsan, tsan]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build python3-pip

      - name: Install and Setup Conan
        uses: conan-io/setup-conan@v1
        with:
           version: 2.25.2

      - name: Install Conan dependencies
        env:
          SANITIZER: ${{ matrix.sanitizer }}
        run: |
          set -euo pipefail
          # clang é mais confiável para thread sanitizer
          if [ "${SANITIZER}" = "tsan" ]; then
            sudo apt-get install -y clang
            export CC=clang
            export CXX=clang++
          fi

          # Define as flags dos sanitizers
          case "${SANITIZER}" in
            asan)
              SAN_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
              LINK_FLAGS="-fsanitize=address"
              ;;
            tsan)
              SAN_FLAGS="-fsanitize=thread -g"
              LINK_FLAGS="-fsanitize=thread"
              ;;
            ubsan)
              SAN_FLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined -g"
              LINK_FLAGS="-fsanitize=undefined"
              ;;
            *)
              echo "Unknown sanitizer: ${SANITIZER}"; exit 1;;
          esac

          echo "Sanitizer flags: ${SAN_FLAGS}"

          # Instala pendencias e gera os toolchains do cmake através do conan
          conan install . --build=missing -s build_type=Debug

          # Configura o projeto via cmake para passar as flags dos sanitizers
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake \
            -DCMAKE_C_FLAGS="${SAN_FLAGS}" \
            -DCMAKE_CXX_FLAGS="${SAN_FLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="${LINK_FLAGS}" \
            -DCMAKE_SHARED_LINKER_FLAGS="${LINK_FLAGS}"

          # Compila e instala o projeto
          cmake --build build -- -j$(nproc)
          cmake --install build --prefix build/install

      - name: Build and run test_package against installed package
        run: |
          set -euo pipefail

          # Instala pendencias e gera os toolchains do cmake através do conan
          conan install test_package --build=missing -s build_type=Debug

          # Configura e compila o pacote de testes
          cmake -S test_package -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=$PWD/build/install \
            -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake || true
          cmake --build test_package/build -- -j$(nproc) || true

          # Executa os testes unitários com os sanitizers habilitados
          if [ -x test_package/build/teste ]; then
            echo "Running test package executable teste"
            ./test_package/build/teste || true
          else
            echo "No test binary found; skipping run"
          fi

      - name: Upload sanitizer logs (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs-${{ matrix.sanitizer }}
          path: build/
